name: BackendTodo CI

on:
  push:
    branches: ["develop", "main"]
    paths:
      - "backend/**"
  pull_request:
    branches: ["develop", "main"]
    paths:
      - "backend/**"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Tests (skip if none)
        working-directory: backend
        run: npm test || echo "No tests yet"

      - name: Build Check
        working-directory: backend
        run: echo "Backend Build Successfully"

      - name: Docker Build Backend
        run: docker build -f devops/docker/backend/Docker.prod -t backend-image ./backend
