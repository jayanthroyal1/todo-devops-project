version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../devops/docker/backend/Dockerfile.prod
    ports:
      - "5000:5000"
    env_file:
      - ../backend/.env

  frontend:
    build:
      context: ../frontend
      dockerfile: ../devops/docker/frontend/Dockerfile.prod
    ports:
      - "3000:80"

  mongo:
    image: mongo:7

  redis:
    image: redis:7